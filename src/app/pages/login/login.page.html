<ion-content class="ion-padding">
  <div class="ion-text-center">
    <img src="assets/logo.png" alt="Logo" class="logo">
    <h2>Ambrósio, o seu chef invisível!</h2>
  </div>

  <ion-item>
    <ion-label position="floating">E-mail</ion-label>
    <ion-input type="email"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Palavra-Passe</ion-label>
    <ion-input type="password"></ion-input>
  </ion-item>

  <ion-button expand="block" class="botao-login" style="margin-top: 20px;" (click)="login()">
    Login
  </ion-button>

  <ion-text class="ion-text-center" style="margin-top: 10px; display: block;">
    Ainda não tem conta? <a routerLink="/registo"><strong>Registe-se</strong></a>
  </ion-text>
</ion-content>
